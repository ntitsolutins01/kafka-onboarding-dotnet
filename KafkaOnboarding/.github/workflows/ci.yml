name: 🚀 CI - Build, Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # permite execução manual

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: Build & Test do projeto .NET
  # ═══════════════════════════════════════════════════════════
  build-and-test:
    name: 🔨 Build & Test (.NET ${{ matrix.dotnet-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['8.0.x']

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 📦 Cache de dependências NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 🔄 Restaurar dependências
        run: dotnet restore

      - name: 🏗️ Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: 🧪 Executar testes
        run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
        continue-on-error: true # remova quando tiver testes

      - name: 📤 Upload dos resultados de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/test-results.trx'
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Lint dos scripts PowerShell
  # ═══════════════════════════════════════════════════════════
  lint-powershell:
    name: 🔍 Lint PowerShell Scripts
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🛠️ Instalar PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Write-Host "✅ PSScriptAnalyzer instalado!" -ForegroundColor Green

      - name: 🔍 Analisar scripts PowerShell
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity @('Error', 'Warning')
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Host "::warning::Foram encontrados $($results.Count) avisos/erros nos scripts." 
          } else {
            Write-Host "✅ Nenhum problema encontrado nos scripts PowerShell!" -ForegroundColor Green
          }

  # ═══════════════════════════════════════════════════════════
  # JOB 3: Validação do Docker Compose
  # ═══════════════════════════════════════════════════════════
  validate-docker-compose:
    name: 🐳 Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐳 Validar docker-compose.yml
        run: |
          docker compose config --quiet
          echo "✅ docker-compose.yml está válido!"

      - name: 📋 Listar serviços
        run: docker compose config --services

  # ═══════════════════════════════════════════════════════════
  # JOB 4: Verificação de Markdown e links
  # ═══════════════════════════════════════════════════════════
  lint-markdown:
    name: 📝 Lint Markdown & Check Links
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 📝 Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
        continue-on-error: true

      - name: 🔗 Verificar links quebrados
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress './**/*.md'
          fail: false
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════
  # JOB 5: Resumo (depende dos demais)
  # ═══════════════════════════════════════════════════════════
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, lint-powershell, validate-docker-compose, lint-markdown]
    if: always()

    steps:
      - name: 📊 Resumo do pipeline
        run: |
          echo "## 🎯 Pipeline CI Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint PowerShell | ${{ needs.lint-powershell.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Compose | ${{ needs.validate-docker-compose.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Lint Markdown | ${{ needs.lint-markdown.result }} |" >> $GITHUB_STEP_SUMMARY
