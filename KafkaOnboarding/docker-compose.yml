name: kafka-onboarding

services:

  # ─────────────────────────────────────────
  # KAFKA (KRaft — sem Zookeeper)
  # ─────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"   # acesso do host Windows (app .NET)
    environment:
      # ── Identidade do nó ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # ── Listeners ──
      # INTERNAL  → containers na mesma rede (Flink)   → kafka:29092
      # EXTERNAL  → host Windows (app .NET)            → localhost:9092
      # CONTROLLER→ quorum do KRaft                    → :9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # ── Replicação (single-node) ──
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # ── Dev-friendly ──
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-flink-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # KAFKA-UI (dashboard web)
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - kafka-flink-net
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────
  # FLINK — JobManager
  # ─────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.19-scala_2.12
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        execution.checkpointing.interval: 30s
        rest.flamegraph.enabled: true
    volumes:
      - ./flink:/opt/flink/usrlib
      - ./flink/lib/flink-sql-connector-kafka-3.3.0-1.19.jar:/opt/flink/lib/flink-sql-connector-kafka-3.3.0-1.19.jar
    networks:
      - kafka-flink-net
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────
  # FLINK — TaskManager
  # ─────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.19-scala_2.12
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    volumes:
      - ./flink:/opt/flink/usrlib
      - ./flink/lib/flink-sql-connector-kafka-3.3.0-1.19.jar:/opt/flink/lib/flink-sql-connector-kafka-3.3.0-1.19.jar
    networks:
      - kafka-flink-net
    depends_on:
      flink-jobmanager:
        condition: service_started

networks:
  kafka-flink-net:
    driver: bridge
    name: kafka-flink-net

volumes:
  kafka-data:
    name: kafka-data
